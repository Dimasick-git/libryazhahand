name: Sync from libultrahand upstream

on:
  schedule:
    # Запуск ежедневно в 05:00 UTC (на час позже HOC-синка RCU,
    # чтобы не конкурировать за rate-limit GitHub).
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (без коммита)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout libryazhahand
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name "ryazha-sync[bot]"
          git config user.email "ryazha-sync[bot]@users.noreply.github.com"

      - name: Run upstream sync
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 scripts/sync_from_upstream.py --dry-run
          else
            python3 scripts/sync_from_upstream.py
          fi

      - name: Push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" -gt 0 ]; then
            echo "Pushing $AHEAD new commit(s)"
            git push origin HEAD:main
          else
            echo "Nothing to push"
          fi
